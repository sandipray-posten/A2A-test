apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: a2a-agents-ingress
  namespace: a2a-agents
  annotations:
    # For NGINX Ingress Controller
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
    # For TLS (uncomment if using cert-manager)
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  # Uncomment for TLS
  # tls:
  #   - hosts:
  #       - agent-a.your-domain.com
  #       - agent-b.your-domain.com
  #     secretName: a2a-agents-tls
  rules:
    - host: agent-a.your-domain.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: agent-a-service
                port:
                  number: 8001
    - host: agent-b.your-domain.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: agent-b-service
                port:
                  number: 8002
