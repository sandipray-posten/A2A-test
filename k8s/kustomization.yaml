apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: a2a-agents

resources:
  - namespace.yaml
  - configmap.yaml
  - secret.yaml
  - agent-a-deployment.yaml
  - agent-b-deployment.yaml
  - ingress.yaml
  - hpa.yaml

commonLabels:
  app.kubernetes.io/name: a2a-agents
  app.kubernetes.io/version: "1.0.0"
  app.kubernetes.io/managed-by: kustomize

# Image configuration - update tag for each release
images:
  - name: a2a-agents
    newName: your-registry.com/a2a-agents
    newTag: "1.0.0"
