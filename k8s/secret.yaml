# IMPORTANT: This is a template. Replace placeholder values before applying.
# In production, use sealed-secrets, external-secrets, or vault integration.
#
# To create the secret manually:
# kubectl create secret generic a2a-secrets -n a2a-agents \
#   --from-literal=GRAVITEE_BASE_URL=https://your-gateway.com/llm \
#   --from-literal=GRAVITEE_API_KEY=your-api-key \
#   --from-literal=GRAVITEE_API_PLATFORM_KEY=your-platform-key

apiVersion: v1
kind: Secret
metadata:
  name: a2a-secrets
  namespace: a2a-agents
type: Opaque
stringData:
  # Gravitee Gateway Configuration (REQUIRED)
  GRAVITEE_BASE_URL: "https://your-gravitee-gateway.com/llm"
  GRAVITEE_API_KEY: "your-api-key-here"
  GRAVITEE_API_PLATFORM_KEY: "your-platform-key-here"
